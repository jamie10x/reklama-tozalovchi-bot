server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name meetus.uz www.meetus.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://meetus.uz$request_uri;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name www.meetus.uz;

    ssl_certificate /etc/letsencrypt/live/meetus.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetus.uz/privkey.pem;

    return 301 https://meetus.uz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name meetus.uz;

    ssl_certificate /etc/letsencrypt/live/meetus.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetus.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $web_upstream web:80;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~ /\.(?!well-known/acme-challenge/) {
        return 404;
    }

    location /api/ {
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /assets/ {
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
